<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="御龙CRM">
  <meta name="theme-color" content="#1B3A5C">
  <meta name="description" content="御龙批发CRM — 非洲服装贸易客户管理系统">

  <title>御龙批发CRM — 非洲服装贸易管理</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Apple Touch Icons -->
  <link rel="apple-touch-icon" href="icons/icon-512.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Preload hint -->
  <link rel="modulepreload" href="js/app.js">
  <link rel="modulepreload" href="js/db.js">
</head>
<body>
  <div id="app" class="app-container">
    <!-- Loading Screen -->
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;gap:16px;background:linear-gradient(135deg,#0F2640,#1B3A5C)">
      <img src="icons/icon-512.png" alt="Logo" style="width:72px;height:72px;border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,0.3)">
      <div style="color:#E8A838;font-size:20px;font-weight:700;letter-spacing:1px">御龙批发CRM</div>
      <div style="color:rgba(255,255,255,0.4);font-size:13px">正在加载...</div>
    </div>
  </div>

  <!-- App Module -->
  <script type="module" src="js/app.js"></script>

  <!-- Register Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.warn('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
